services:
  postgres:
    image: postgres:15
    container_name: leetcode
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: leetcode
    ports:
      - "5432:5432"
    volumes:
      - postgres_leetcode:/var/lib/postgresql/data
  
volumes:
  postgres_leetcode:

